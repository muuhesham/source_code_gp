name: fa3liat

services:
  # --- Core Infrastructure ---
  db:
    container_name: gp-database
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fa3liat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fa3liat}
      POSTGRES_DB: ${POSTGRES_DB:-fa3liat}
    ports:
      - '${DB_PORT:-5434}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-fa3liat} -d $${POSTGRES_DB:-fa3liat}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: gp-cache
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6381}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    container_name: gp-mail-test
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - '${MAIL_UI_PORT:-8028}:8025' # UI
      - '${MAIL_SMTP_PORT:-1025}:1025' # SMTP

  ollama:
    container_name: gp-ai-engine
    image: alpine/ollama:latest
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    ports:
      - '${OLLAMA_PORT:-11436}:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Helper to pull the model
  ollama-model:
    image: alpine/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    command: pull ${OLLAMA_MODEL:-nomic-embed-text-v2-moe:latest}
    restart: "no"

  # --- Workers (Start by default) ---
  mail-worker:
    container_name: gp-mail-worker
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./src/backend/.env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MAIL_HOST=${MAIL_HOST:-mailhog}
      - MAIL_PORT=${MAIL_PORT:-1025}
    command: npm run queue:mail-worker

  sms-worker:
    container_name: gp-sms-worker
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./src/backend/.env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    command: npm run queue:sms-worker

  embedding-worker:
    container_name: gp-embedding-worker
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - ./src/backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fa3liat:fa3liat@db:5432/fa3liat?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    command: npm run queue:embedding-worker

  # --- Stripe CLI (Starts by default) ---
  stripe:
    container_name: gp-stripe-cli
    image: stripe/stripe-cli:latest
    restart: unless-stopped
    env_file:
      - ./src/backend/.env
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    command: >-
      listen
      --forward-to backend:3000/api/v1/payments/webhook
      --events checkout.session.completed,payment_intent.payment_failed
    depends_on:
      redis:
        condition: service_healthy

  # --- Backend ---
  backend:
    container_name: gp-backend
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./src/backend/.env
    environment:
      - PORT=${PORT:-3000}
      - BIND_HOST=${BIND_HOST:-0.0.0.0}
      - DATABASE_URL=${DATABASE_URL:-postgresql://fa3liat:fa3liat@db:5432/fa3liat?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MAIL_HOST=${MAIL_HOST:-mailhog}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - ./src/backend:/app
      - /app/node_modules
      - ./src/backend/uploads:/app/uploads
      - ./src/backend/logs:/app/logs
    command: >
      sh -c "npx prisma migrate reset --force --skip-seed &&
             npx prisma migrate deploy &&
             npm run prisma:seed &&
             npm run dev"

  # --- Frontend ---
  frontend:
    container_name: gp-frontend
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./src/frontend/.env
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-/}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://backend:3000}
    ports:
      - '${FRONT_PORT:-5173}:5173'
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # --- Database Tools ---
  prisma-studio:
    container_name: gp-prisma-studio
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./src/backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fa3liat:fa3liat@db:5432/fa3liat?schema=public}
    ports:
      - '${PRISMA_STUDIO_PORT:-5555}:5555'
    volumes:
      - ./src/backend:/app
      - /app/node_modules
    command: npx prisma studio --browser none

volumes:
  postgres_data:
  redis_data:
  ollama_data:
